name: Publish Relay Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compute release tag
        id: version
        run: |
          ts="$(date -u +'%Y%m%d-%H%M%S')"
          short_sha="${GITHUB_SHA::7}"
          echo "tag=release-${ts}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Create git tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            "/repos/${GITHUB_REPOSITORY}/git/refs" \
            -f ref="refs/tags/${{ steps.version.outputs.tag }}" \
            -f sha="${GITHUB_SHA}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --target "${GITHUB_SHA}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "Automated release for ${GITHUB_SHA}."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/pando-relay
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main
            type=raw,value=${{ steps.version.outputs.tag }}
            type=sha,format=short,prefix=sha-

      - name: Build and push relay image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
